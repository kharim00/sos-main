$kind: http-request
url: "{{baseUrl}}/{{api_version}}/appointments"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "userId": 1,
      "doctorId": 1,
      "appointmentDate": "2024-12-25",
      "startTime": "10:00",
      "endTime": "11:00",
      "reason": "General Checkup"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000
