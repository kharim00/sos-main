$kind: http-request
url: "{{baseUrl}}/{{api_version}}/users/{{userId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "fullName": "John Updated",
      "phone": "5555555555"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
order: 4000
